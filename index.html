<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>humliyo — Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #fafbfc;
            font-family: 'Inter', sans-serif;
            color: #374151;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        /* Animated background circles */
        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 8s ease-in-out infinite;
        }

        .circle-1 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #fde68a, #fcd34d);
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }

        .circle-2 {
            width: 350px;
            height: 350px;
            background: linear-gradient(135deg, #a7f3d0, #6ee7b7);
            bottom: -80px;
            left: -80px;
            animation-delay: 2s;
        }

        .circle-3 {
            width: 250px;
            height: 250px;
            background: linear-gradient(135deg, #fecaca, #fca5a5);
            top: 50%;
            left: 10%;
            animation-delay: 4s;
        }

        .circle-4 {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #c7d2fe, #a5b4fc);
            bottom: 20%;
            right: 10%;
            animation-delay: 3s;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(20px, -20px) scale(1.05);
            }
            66% {
                transform: translate(-15px, 15px) scale(0.95);
            }
        }

        .container {
            text-align: center;
            max-width: 520px;
            position: relative;
            z-index: 1;
        }

        .logo-wrapper {
            display: block;
            margin-bottom: 32px;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 4.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            display: inline;
        }

        .logo-hum {
            color: #059669;
        }

        .logo-liyo {
            color: #fbbf24;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            font-size: 0.875rem;
            font-weight: 500;
            color: #6b7280;
            margin-bottom: 40px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
        }

        .badge::before {
            content: '';
            width: 8px;
            height: 8px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.2);
                opacity: 0.7;
            }
        }

        .hint {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 600;
            color: #1f2937;
            line-height: 1.3;
            margin-bottom: 12px;
        }

        .subtext {
            font-size: 1rem;
            color: #9ca3af;
            font-weight: 400;
        }

        .map-icon {
            margin-top: 48px;
            display: flex;
            justify-content: center;
            gap: 16px;
        }

        .pin {
            width: 12px;
            height: 12px;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            animation: drop 2s ease-in-out infinite;
        }

        .pin-1 {
            background: linear-gradient(135deg, #f97316, #ea580c);
            animation-delay: 0s;
        }

        .pin-2 {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            animation-delay: 0.3s;
        }

        .pin-3 {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            animation-delay: 0.6s;
        }

        @keyframes drop {
            0%, 100% {
                transform: rotate(-45deg) translateY(0);
                opacity: 0.6;
            }
            50% {
                transform: rotate(-45deg) translateY(-8px);
                opacity: 1;
            }
        }

        .footer {
            position: fixed;
            bottom: 28px;
            font-size: 0.8rem;
            color: #d1d5db;
            font-weight: 500;
            letter-spacing: 0.05em;
            z-index: 1;
        }

        @media (max-width: 480px) {
            .logo {
                font-size: 3.5rem;
            }
            .hint {
                font-size: 1.5rem;
            }
            .circle-1, .circle-2 {
                width: 250px;
                height: 250px;
            }
            .circle-3, .circle-4 {
                width: 150px;
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated background -->
    <div class="bg-shapes">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
        <div class="circle circle-4"></div>
    </div>

    <div class="container">
        <div class="logo-wrapper">
            <h1 class="logo"><span class="logo-hum">hum</span><span class="logo-liyo">liyo</span></h1>
        </div>
        <div class="badge">Coming Soon</div>
        <p class="hint">The map is waking up...</p>
        <p class="subtext">Something exciting is on the way</p>

        <div class="map-icon">
            <div class="pin pin-1"></div>
            <div class="pin pin-2"></div>
            <div class="pin pin-3"></div>
        </div>
    </div>

    <p class="footer">HUMLIYO</p>
</body>
</html>
